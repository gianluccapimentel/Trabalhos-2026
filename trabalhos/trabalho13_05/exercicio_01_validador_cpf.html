<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de CPF | Exercício 01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1419;
            --bg-card: #1a212b;
            --bg-input: #131921;
            --border: #2a3441;
            --text-primary: #e8ecf1;
            --text-secondary: #8a96a8;
            --accent: #f4a261;
            --success: #4ade80;
            --success-bg: rgba(74, 222, 128, 0.08);
            --error: #f87171;
            --error-bg: rgba(248, 113, 113, 0.08);
            --neutral: #475569;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(244, 162, 97, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(74, 222, 128, 0.04) 0%, transparent 40%);
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.02) inset;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.25rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.15);
        }

        input[type="text"]::placeholder {
            color: var(--neutral);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #1a1207;
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        button:hover {
            background: #ffb074;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(244, 162, 97, 0.25);
        }

        button:active {
            transform: translateY(0);
        }

        .resultado {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .resultado.show {
            opacity: 1;
            transform: translateY(0);
        }

        .resultado.valido {
            background: var(--success-bg);
            color: var(--success);
            border-color: rgba(74, 222, 128, 0.25);
        }

        .resultado.invalido {
            background: var(--error-bg);
            color: var(--error);
            border-color: rgba(248, 113, 113, 0.25);
        }

        .resultado-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .resultado.valido .resultado-icon {
            background: rgba(74, 222, 128, 0.15);
        }

        .resultado.invalido .resultado-icon {
            background: rgba(248, 113, 113, 0.15);
        }

        .resultado-text strong {
            display: block;
            font-size: 1.05rem;
            margin-bottom: 2px;
        }

        .resultado-text span {
            display: block;
            font-size: 0.85rem;
            opacity: 0.85;
            font-family: 'JetBrains Mono', monospace;
        }

        .footer-info {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

    <main class="card">
        <div class="badge">Exercício 01</div>
        <h1>Validador de CPF</h1>
        <p class="subtitle">Insira um CPF para verificar a validade dos dígitos verificadores.</p>

        <div class="form-group">
            <label for="cpf">Número do CPF</label>
            <input
                type="text"
                id="cpf"
                placeholder="000.000.000-00"
                maxlength="14"
                autocomplete="off"
                inputmode="numeric"
            >
        </div>

        <button id="btnValidar">Validar CPF</button>

        <div id="resultado" class="resultado">
            <div class="resultado-icon"></div>
            <div class="resultado-text">
                <strong></strong>
                <span></span>
            </div>
        </div>

        <div class="footer-info">
            Algoritmo · Dígitos Verificadores (mod 11)
        </div>
    </main>

    <script>
        const inputCpf = document.getElementById('cpf');
        const btnValidar = document.getElementById('btnValidar');
        const divResultado = document.getElementById('resultado');
        const iconResultado = divResultado.querySelector('.resultado-icon');
        const textResultado = divResultado.querySelector('.resultado-text strong');
        const subTextResultado = divResultado.querySelector('.resultado-text span');

        inputCpf.addEventListener('input', (e) => {
            let valor = e.target.value.replace(/\D/g, ''); // só dígitos
            valor = valor.substring(0, 11);

            if (valor.length > 9) {
                valor = valor.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
            } else if (valor.length > 6) {
                valor = valor.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
            } else if (valor.length > 3) {
                valor = valor.replace(/(\d{3})(\d{1,3})/, '$1.$2');
            }
            e.target.value = valor;

            divResultado.classList.remove('show', 'valido', 'invalido');
        });

        
        function validarCPF(cpf) {
            
            cpf = cpf.replace(/\D/g, '');

            if (cpf.length !== 11) return false;

            let soma = 0;
            for (let i = 0; i < 9; i++) {
                // peso de 10 até 2 (contagem regressiva)
                soma += parseInt(cpf.charAt(i)) * (10 - i);
            }
            let resto = (soma * 10) % 11;
            if (resto === 10) resto = 0; // se for 10, considera 0
            if (resto !== parseInt(cpf.charAt(9))) return false;

            soma = 0;
            for (let i = 0; i < 10; i++) {
                soma += parseInt(cpf.charAt(i)) * (11 - i);
            }
            resto = (soma * 10) % 11;
            if (resto === 10) resto = 0;
            if (resto !== parseInt(cpf.charAt(10))) return false;

            return true;
        }

        function mostrarResultado(valido, cpfDigitado) {
            divResultado.classList.remove('valido', 'invalido');

            if (valido) {
                divResultado.classList.add('valido');
                iconResultado.textContent = '✓';
                textResultado.textContent = 'CPF Válido';
                subTextResultado.textContent = cpfDigitado;
            } else {
                divResultado.classList.add('invalido');
                iconResultado.textContent = '✕';
                textResultado.textContent = 'CPF Inválido';
                subTextResultado.textContent = cpfDigitado || 'Digite um CPF de 11 dígitos';
            }

            void divResultado.offsetWidth;
            divResultado.classList.add('show');
        }

        btnValidar.addEventListener('click', () => {
            const valor = inputCpf.value.trim();
            if (valor.replace(/\D/g, '').length === 0) {
                mostrarResultado(false, '');
                return;
            }
            const ok = validarCPF(valor);
            mostrarResultado(ok, valor);
        });

        inputCpf.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btnValidar.click();
        });
    </script>

</body>
</html>
