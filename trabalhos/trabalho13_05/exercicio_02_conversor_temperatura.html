<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Dinâmico de Temperatura | Exercício 02</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #faf8f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --border: #e8e3dc;
            --accent: #f59e0b;
            --neutral: #94a3b8;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(ellipse at top left, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(245, 158, 11, 0.08) 0%, transparent 50%);
        }

        .wrapper {
            width: 100%;
            max-width: 720px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 3rem;
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 12px;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .converter {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px;
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.04),
                0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
            align-items: stretch;
        }

        .unit-card {
            padding: 32px 28px;
            border-radius: 18px;
        }

        .unit-card.celsius {
            border-right: 1px dashed var(--border);
        }

        .unit-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .unit-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .unit-symbol {
            font-family: 'Instrument Serif', serif;
            font-size: 1.4rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .temp-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Instrument Serif', serif;
            font-size: 4rem;
            font-weight: 400;
            color: var(--text-primary);
            line-height: 1;
            padding: 0;
            -moz-appearance: textfield;
            letter-spacing: -0.02em;
        }

        .temp-input::-webkit-outer-spin-button,
        .temp-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .temp-input::placeholder {
            color: var(--neutral);
            opacity: 0.4;
        }

        .swap-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .swap-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .formulas {
            margin-top: 20px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .formulas span {
            display: inline-block;
            margin: 0 10px;
        }

        /* Responsivo */
        @media (max-width: 640px) {
            h1 { font-size: 2.25rem; }
            .grid {
                grid-template-columns: 1fr;
            }
            .unit-card.celsius {
                border-right: none;
                border-bottom: 1px dashed var(--border);
            }
            .swap-divider {
                padding: 8px 0;
            }
            .swap-icon {
                transform: rotate(90deg);
            }
            .temp-input { font-size: 3rem; }
            .formulas span { display: block; margin: 4px 0; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="eyebrow">Exercício 02</div>
            <h1>Conversor <em>dinâmico</em></h1>
            <p class="subtitle">Converta entre Celsius e Fahrenheit em tempo real. Digite em qualquer um dos campos.</p>
        </header>

        <div class="converter">
            <div class="grid">
                <!-- Celsius -->
                <div class="unit-card celsius">
                    <div class="unit-label">
                        <span class="unit-name">Celsius</span>
                        <span class="unit-symbol">°C</span>
                    </div>
                    <input
                        type="number"
                        id="inputCelsius"
                        class="temp-input"
                        step="0.1"
                        placeholder="0.00"
                        autocomplete="off"
                    >
                </div>

                <!-- Divisor -->
                <div class="swap-divider">
                    <div class="swap-icon">⇄</div>
                </div>

                <!-- Fahrenheit -->
                <div class="unit-card fahrenheit">
                    <div class="unit-label">
                        <span class="unit-name">Fahrenheit</span>
                        <span class="unit-symbol">°F</span>
                    </div>
                    <input
                        type="number"
                        id="inputFahrenheit"
                        class="temp-input"
                        step="0.1"
                        placeholder="32.00"
                        autocomplete="off"
                    >
                </div>
            </div>
        </div>

        <div class="formulas">
            <span>F = (C × 9/5) + 32</span>
            <span>C = (F − 32) × 5/9</span>
        </div>
    </div>

    <script>
        const inputCelsius    = document.getElementById('inputCelsius');
        const inputFahrenheit = document.getElementById('inputFahrenheit');

        // Flag para evitar loop infinito de eventos
        // (ao atualizar programaticamente um input, ele NÃO dispara o evento 'input'
        // por padrão, mas usamos a flag por segurança caso o código mude)
        let atualizandoProgramaticamente = false;

        // ---- Conversões ----
        function celsiusParaFahrenheit(c) {
            return (c * 9 / 5) + 32;
        }

        function fahrenheitParaCelsius(f) {
            return (f - 32) * 5 / 9;
        }

        // ---- Evento: usuário digita em Celsius ----
        inputCelsius.addEventListener('input', () => {
            if (atualizandoProgramaticamente) return;

            const valor = inputCelsius.value;
            if (valor === '' || valor === '-') {
                atualizandoProgramaticamente = true;
                inputFahrenheit.value = '';
                atualizandoProgramaticamente = false;
                return;
            }

            const c = parseFloat(valor);
            if (isNaN(c)) return;

            const f = celsiusParaFahrenheit(c);

            atualizandoProgramaticamente = true;
            inputFahrenheit.value = f.toFixed(2);
            atualizandoProgramaticamente = false;
        });

        // ---- Evento: usuário digita em Fahrenheit ----
        inputFahrenheit.addEventListener('input', () => {
            if (atualizandoProgramaticamente) return;

            const valor = inputFahrenheit.value;
            if (valor === '' || valor === '-') {
                atualizandoProgramaticamente = true;
                inputCelsius.value = '';
                atualizandoProgramaticamente = false;
                return;
            }

            const f = parseFloat(valor);
            if (isNaN(f)) return;

            const c = fahrenheitParaCelsius(f);

            atualizandoProgramaticamente = true;
            inputCelsius.value = c.toFixed(2);
            atualizandoProgramaticamente = false;
        });
    </script>

</body>
</html>
