<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamagochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --accent: #e8c14a;
      --muted: #3a3a3a;
      --text: #f0ede6;
      --locked: #2a2a2a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    
    header {
      text-align: center;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      letter-spacing: 0.12em;
      color: var(--text);
      line-height: 1;
    }


    
    .stage {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    
    .main-frame {
      position: relative;
      width: min(440px, 90vw);
      aspect-ratio: 4/3;
      border: 1px solid var(--muted);
      overflow: hidden;
      background: var(--surface);
      flex-shrink: 0;
    }

    .main-frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .main-frame img.active { opacity: 1; }





    
    .reset-frame {
      position: relative;
      width: min(140px, 35vw);
      aspect-ratio: 3/4;
      border: 1px solid var(--muted);
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .reset-frame:not(.locked):hover {
      border-color: var(--accent);
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(232,193,74,0.18);
    }
    .reset-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.4s, opacity 0.4s;
    }

    
    .reset-frame .reset-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(0,0,0,0.6);
      opacity: 0;
      transition: opacity 0.3s;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.14em;
      color: var(--accent);
      pointer-events: none;
    }

    .reset-frame:not(.locked):hover .reset-label { opacity: 1; }

    /* Estado travado */
    .reset-frame.locked {
      cursor: not-allowed;
      border-color: #2a2a2a;
    }
    .reset-frame.locked img {
      filter: grayscale(100%) brightness(0.35);
    }
    .lock-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
      color: #666;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .lock-overlay svg { width: 24px; height: 24px; stroke: #666; }
    .reset-frame.locked .lock-overlay { opacity: 1; }

    /* Caption */
    .reset-frame .caption {
      position: absolute;
      top: 8px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      pointer-events: none;
    }




  </style>
</head>
<body>

  <header>
    <h1>Tamagochi</h1>
  </header>

  <div class="stage">
    <!-- Imagem principal -->
    <div class="main-frame" id="mainFrame">
      <img src="slide1.png" alt="Slide 1" class="active" />
      <img src="slide2.png" alt="Slide 2" />
      <img src="slide3.png" alt="Slide 3" />
      <img src="slide4.png" alt="Slide 4" />
</div>


    <div class="reset-frame" id="resetBtn">
      <img src="reset.png" alt="Reset" />
      <span class="caption"></span>

      
      <div class="reset-label">
        Alimentar
      </div>

      
      <div class="lock-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Travado
      </div>
    </div>
  </div>

<script src="js.js"></script>
</body>
</html>
